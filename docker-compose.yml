version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: brandprotection
      POSTGRES_USER: bps
      POSTGRES_PASSWORD: bps
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bps -d brandprotection"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bps:bps@postgres:5432/brandprotection
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8888:8000"
    volumes:
      - .:/app
      - screenshots:/tmp/screenshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-scan:
    build: .
    command: celery -A workers.pipeline worker --queues scans --concurrency 4 --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bps:bps@postgres:5432/brandprotection
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - .:/app
      - screenshots:/tmp/screenshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-discovery:
    build:
      context: .
      dockerfile: Dockerfile.light
    command: celery -A workers.pipeline worker --queues discovery --concurrency 2 --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bps:bps@postgres:5432/brandprotection
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-beat:
    build:
      context: .
      dockerfile: Dockerfile.light
    command: celery -A workers.pipeline beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bps:bps@postgres:5432/brandprotection
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  screenshots:
